<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxes</title>
    <link rel="stylesheet" href="./styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
        <section  class="carrusel container mt-4">
            <!-- Bootstrap carousel -->
            <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel" data-bs-interval="10000">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="2.png" class="d-block w-100" alt="First slide">
                    </div>
                    <div class="carousel-item">
                        <img src="3.png" class="d-block w-100" alt="Second slide">
                    </div>
                    <div class="carousel-item">
                        <img src="1.png" class="d-block w-100" alt="Third slide">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </section>
        <section class="container mt-4 text-center">
        <h1>Little Boxes</h1>
        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th scope="col-sm-4">Column 1</th>
                    <th scope="col-md-6">Column 2</th>
                    <th scope="col-lg-2">Column 3</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td scope="row">Box1</td>
                    <td scope="row">Box2</td>
                    <td scope="row">Box3</td>
                </tr>
                <tr>
                    <td scope="row">Box4</td>
                    <td scope="row">Box5</td>
                    <td scope="row">Box6</td>
                </tr>
                <tr>
                    <td scope="row">Box7</td>
                    <td scope="row">Box8</td>
                    <td scope="row">Box9</td>
                </tr>
            </tbody>
        </table>
        <div id="resultado" class="mt-4"></div>
        <script>
            const persona = {
                name: "Juan",
                apellidos: "Carlos",
                cedula: "109713486",
                fullname: function() {
                    return `${this.name} ${this.apellidos}`;
                }
            };
            const persona2 = {
                name: "Maria",
                apellidos: "Gomez",
                cedula: "109713487"
            };

            const resultado = document.getElementById("resultado");
            resultado.innerHTML = `
                <h2>Persona 1</h2>
                <p><strong>Nombre:</strong> ${persona.fullname()}</p>
                <p><strong>Cédula:</strong> ${persona.cedula}</p>
                <h2>Persona 2</h2>
                <p><strong>Nombre:</strong> ${persona2.name} </p>
                <p><strong>Apellidos:</strong> ${persona2.apellidos}</p>
                <p><strong>Cédula:</strong> ${persona2.cedula}</p>
            `;
        </script>
    </section>
    <!-- Bootstrap JS bundle (includes Popper) -->
    <!-- removed integrity/crossorigin for local file loading issues -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
